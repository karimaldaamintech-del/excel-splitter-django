<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Excel Splitter SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Excel Chunk Splitter</h1>
            <p class="text-gray-500 text-sm mt-2">Upload a massive Excel sheet and split it instantly into optimized parts.</p>
        </div>
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Select Excel File (.xlsx)</label>
                <input type="file" name="excel_file" accept=".xlsx, .xls" required
                       class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-300 rounded-md p-1">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Rows Per File</label>
                <input type="number" name="rows_count" value="9998" min="1" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                <span class="text-xs text-gray-400 mt-1 block">Standard limit is 9998 rows.</span>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-md transition duration-150 ease-in-out shadow">
                Split & Download ZIP
            </button>
        </form>
        {% if error %}
        <div class="mt-4 p-3 bg-red-50 text-red-700 text-sm rounded-md text-center">
            {{ error }}
        </div>
        {% endif %}
    </div>
</body>
</html>
